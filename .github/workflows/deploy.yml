name: Deploy to Namecheap

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # Syntax-check every PHP file before anything touches the server — a
  # push with a parse error must fail here, not take production down.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1' # matches the minimum version the app targets
      - name: php -l all PHP files
        run: find src config database public -name '*.php' -print0 | xargs -0 -n1 php -l > /dev/null

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      # The FTP account must be rooted at the cPanel home directory so both
      # the web root and the above-webroot app folders are reachable.
      - name: Sync public/ -> public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: public/
          server-dir: public_html/

      - name: Sync src/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: src/
          server-dir: src/

      - name: Sync config/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: config/
          server-dir: config/

      - name: Sync database/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: database/
          server-dir: database/

      # Apply DB migrations after the files are in place. The host has no shell
      # for us, so this pings the token-guarded public/deploy-migrate.php over
      # HTTPS (idempotent — safe to run every deploy). Skips cleanly if the
      # DEPLOY_MIGRATE_TOKEN secret isn't set, so it never blocks a deploy for
      # anyone who hasn't opted in; a real migration error (5xx) does fail here.
      - name: Apply database migrations
        env:
          MIGRATE_TOKEN: ${{ secrets.DEPLOY_MIGRATE_TOKEN }}
          MIGRATE_URL: ${{ vars.MIGRATE_URL }}
        run: |
          if [ -z "$MIGRATE_TOKEN" ]; then
            echo "DEPLOY_MIGRATE_TOKEN secret not set — skipping auto-migration."
            exit 0
          fi
          URL="${MIGRATE_URL:-https://princecaleb.dev/deploy-migrate.php}"
          echo "Triggering migration at $URL"
          code=$(curl -sS -o /tmp/migrate.out -w '%{http_code}' -X POST "$URL" -H "X-Deploy-Token: $MIGRATE_TOKEN")
          echo "HTTP $code"; cat /tmp/migrate.out; echo
          case "$code" in
            200) echo "Migration applied." ;;
            503) echo "::warning::Server-side DEPLOY_MIGRATE_TOKEN not configured — migration skipped." ;;
            *)   echo "::error::Migration request failed (HTTP $code)."; exit 1 ;;
          esac
