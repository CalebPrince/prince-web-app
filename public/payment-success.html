<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/error-log.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0b0c0e">
<link rel="icon" type="image/png" href="/icons/icon-32.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<script>(function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<title>Payment Successful - Prince Caleb</title>
<meta name="description" content="Your payment was successful.">
<meta name="robots" content="noindex, nofollow">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="/" class="brand-logo text-decoration-none">Prince Caleb<span class="dot">.</span></a>
    <button type="button" class="theme-toggle" aria-label="Toggle dark mode">&#127769;</button>
  </div>
</nav>

<main class="section" id="main-content">
  <div class="container" style="max-width: 620px;">
    <div class="contact-card text-center">
      <p class="eyebrow mb-2">Payment successful</p>
      <h1 class="display-6 mb-3">Thank you. Your payment was received.</h1>
      <p class="text-muted-custom mb-4" id="success-message">I will reach out shortly with the next steps.</p>
      <div id="success-reference" class="alert alert-success py-2 small d-none"></div>
      <div class="d-flex flex-column flex-sm-row justify-content-center gap-2 mt-4">
        <a href="/request.html" class="btn-brand">Start project details</a>
        <a href="/" class="btn-brand-outline">Back to home</a>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/theme.js"></script>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const source = params.get('source') || '';
  const reference = params.get('reference') || '';
  const message = document.getElementById('success-message');
  const referenceBox = document.getElementById('success-reference');

  if (source === 'starter') {
    message.textContent = 'Your Starter deposit is confirmed. I will reach out shortly to kick things off.';
  } else if (source === 'payment-link') {
    message.textContent = 'Your invoice payment is confirmed. Thank you.';
  }

  if (reference) {
    referenceBox.textContent = `Reference: ${reference}`;
    referenceBox.classList.remove('d-none');
  }
})();
</script>
<script src="/js/analytics.js"></script>
<script src="/js/pwa-register.js"></script>
</body>
</html>
