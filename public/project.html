<div class="modal fade" id="live-demo-modal" tabindex="-1">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="live-demo-title">Live Demo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-0">
        <iframe id="live-demo-frame" src="" title="Live demo" style="width:100%;height:100%;border:0;"></iframe>
      </div>
    </div>
  </div>
</div>

<button type="button" id="ai-widget-toggle">💬 Live Chat</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/content.js"></script>
<script src="/js/animations.js"></script>
<script src="/js/ai-boot.js"></script>
<script>
(async function () {
  const slug = new URLSearchParams(window.location.search).get('slug');
  const container = document.getElementById('project-content');

  if (!slug) {
    window.location.href = '/projects.html';
    return;
  }

  try {
    const p = await api.get(`/api/v1/projects/${encodeURIComponent(slug)}`);
    const pageTitle = `${p.title} — Prince Caleb`;
    const canonicalUrl = `https://princecaleb.dev/project.html?slug=${encodeURIComponent(slug)}`;
    document.getElementById('page-title').textContent = pageTitle;
    document.getElementById('page-description')?.setAttribute('content', p.summary);
    document.getElementById('page-canonical')?.setAttribute('href', canonicalUrl);
    document.getElementById('og-title')?.setAttribute('content', pageTitle);
    document.getElementById('og-description')?.setAttribute('content', p.summary);
    document.getElementById('og-url')?.setAttribute('content', canonicalUrl);
    document.getElementById('twitter-title')?.setAttribute('content', pageTitle);
    document.getElementById('twitter-description')?.setAttribute('content', p.summary);

    const links = [];
    if (p.is_embeddable && p.live_url) {
      links.push(`<button type="button" class="btn-brand" id="live-demo-btn">▶ Live Demo</button>`);
    }
    if (p.live_url) links.push(`<a href="${p.live_url}" target="_blank" rel="noopener" class="btn-brand-outline">View live site →</a>`);
    if (p.repo_url) links.push(`<a href="${p.repo_url}" target="_blank" rel="noopener" class="btn-brand-outline">View repository</a>`);

    container.innerHTML = `
      <header class="hero pb-0">
        <div class="container">
          <p class="eyebrow mb-3 hero-animate hero-animate-1">${p.category.replace('_', ' ')}</p>
          <h1 class="display-6 mb-3 hero-animate hero-animate-2">${p.title}</h1>
          <p class="fs-5 text-muted-custom mb-4 hero-animate hero-animate-3" style="max-width:65ch;">${p.summary}</p>
          <div class="mb-4 hero-animate hero-animate-3">${p.tags.map(t => `<span class="tag-chip">${t.name}</span>`).join('')}</div>
          <div class="d-flex flex-wrap gap-3 mb-4 hero-animate hero-animate-4">${links.join('')}</div>
        </div>
      </header>
      <div class="container pb-5">
        <img src="${p.cover_image_path}" alt="${p.title}" class="w-100 rounded-4 mb-5 reveal" style="aspect-ratio:16/9;object-fit:cover;">
        ${p.gallery && p.gallery.length ? `
        <div class="row g-3 mb-5 reveal">
          ${p.gallery.map(src => `
            <div class="col-md-4">
              <img src="${src}" alt="${p.title} screenshot" class="w-100 rounded-3" style="aspect-ratio:4/3;object-fit:cover;">
            </div>
          `).join('')}
        </div>` : ''}
        <div class="row">
          <div class="col-lg-8 reveal">
            <h3 class="mb-3">The case study</h3>
            <p class="text-muted-custom" style="white-space: pre-line;">${p.case_study_body || 'Case study details coming soon.'}</p>
          </div>
        </div>
        <div class="text-center mt-5 pt-4 border-top reveal">
          <h4 class="mb-3">Want something like this?</h4>
          <a href="/contact.html?project=${p.id}" class="btn-brand">Let's talk about your project →</a>
        </div>
      </div>
    `;

    if (p.is_embeddable && p.live_url) {
      const demoModalEl = document.getElementById('live-demo-modal');
      const demoModal = new bootstrap.Modal(demoModalEl);
      document.getElementById('live-demo-title').textContent = `Live Demo — ${p.title}`;
      document.getElementById('live-demo-btn').addEventListener('click', () => {
        document.getElementById('live-demo-frame').src = p.live_url;
        demoModal.show();
      });
      demoModalEl.addEventListener('hidden.bs.modal', () => {
        document.getElementById('live-demo-frame').src = '';
      });
    }
  } catch (e) {
    container.innerHTML = `
      <div class="container py-5 text-center">
        <h1 class="mb-3">Project not found</h1>
        <a href="/projects.html" class="btn-brand">← Back to projects</a>
      </div>`;
  }
})();
</script>
</body>
