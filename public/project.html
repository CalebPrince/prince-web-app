<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Case Study — Prince Caleb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="/" class="brand-logo text-decoration-none">Prince Caleb<span class="dot">.</span></a>
    <button class="nav-toggle d-md-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#nav-drawer" aria-label="Toggle navigation">☰</button>
    <div class="d-none d-md-flex gap-1">
      <a href="/" class="nav-link">Home</a>
      <a href="/about.html" class="nav-link">About</a>
      <a href="/services.html" class="nav-link">Services</a>
      <a href="/projects.html" class="nav-link active">Projects</a>
      <a href="/contact.html" class="nav-link">Contact</a>
    </div>
    <a href="/contact.html" class="btn-brand d-none d-md-inline-block">Start a project</a>
  </div>
</nav>

<div class="offcanvas offcanvas-end nav-drawer" tabindex="-1" id="nav-drawer">
  <div class="offcanvas-header">
    <span class="brand-logo">Prince Caleb<span class="dot">.</span></span>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column">
    <a href="/" class="nav-link">Home</a>
    <a href="/about.html" class="nav-link">About</a>
    <a href="/services.html" class="nav-link">Services</a>
    <a href="/projects.html" class="nav-link">Projects</a>
    <a href="/contact.html" class="nav-link">Contact</a>
    <a href="/contact.html" class="btn-brand text-center mt-3">Start a project</a>
  </div>
</div>

<div id="project-content">
  <div class="container py-5">
    <div class="skeleton mb-4" style="height:24px;width:200px;"></div>
    <div class="skeleton mb-4" style="height:48px;width:70%;"></div>
    <div class="skeleton" style="height:360px;"></div>
  </div>
</div>

<footer class="site-footer">
  <div class="container d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2">
    <span class="brand-logo" style="color:#fff;">Prince Caleb<span class="dot">.</span></span>
    <div class="d-flex gap-4">
      <a href="/about.html">About</a>
      <a href="/services.html">Services</a>
      <a href="/projects.html">Projects</a>
      <a href="/contact.html">Contact</a>
    </div>
  </div>
  <div class="container mt-3">
    <small>&copy; 2026 Prince Caleb. All rights reserved.</small>
  </div>
</footer>

<button type="button" id="ai-widget-toggle">💬 Live Chat</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/content.js"></script>
<script src="/js/animations.js"></script>
<script src="/js/ai-boot.js"></script>
<script>
(async function () {
  const slug = new URLSearchParams(window.location.search).get('slug');
  const container = document.getElementById('project-content');

  if (!slug) {
    window.location.href = '/projects.html';
    return;
  }

  try {
    const p = await api.get(`/api/v1/projects/${encodeURIComponent(slug)}`);
    document.getElementById('page-title').textContent = `${p.title} — Prince Caleb`;

    const links = [];
    if (p.live_url) links.push(`<a href="${p.live_url}" target="_blank" rel="noopener" class="btn-brand">View live site →</a>`);
    if (p.repo_url) links.push(`<a href="${p.repo_url}" target="_blank" rel="noopener" class="btn-brand-outline">View repository</a>`);

    container.innerHTML = `
      <header class="hero pb-0">
        <div class="container">
          <p class="eyebrow mb-3 hero-animate hero-animate-1">${p.category.replace('_', ' ')}</p>
          <h1 class="display-6 mb-3 hero-animate hero-animate-2">${p.title}</h1>
          <p class="fs-5 text-muted-custom mb-4 hero-animate hero-animate-3" style="max-width:65ch;">${p.summary}</p>
          <div class="mb-4 hero-animate hero-animate-3">${p.tags.map(t => `<span class="tag-chip">${t.name}</span>`).join('')}</div>
          <div class="d-flex flex-wrap gap-3 mb-4 hero-animate hero-animate-4">${links.join('')}</div>
        </div>
      </header>
      <div class="container pb-5">
        <img src="${p.cover_image_path}" alt="${p.title}" class="w-100 rounded-4 mb-5 reveal" style="aspect-ratio:16/9;object-fit:cover;">
        <div class="row">
          <div class="col-lg-8 reveal">
            <h3 class="mb-3">The case study</h3>
            <p class="text-muted-custom" style="white-space: pre-line;">${p.case_study_body || 'Case study details coming soon.'}</p>
          </div>
        </div>
        <div class="text-center mt-5 pt-4 border-top reveal">
          <h4 class="mb-3">Want something like this?</h4>
          <a href="/contact.html?project=${p.id}" class="btn-brand">Let's talk about your project →</a>
        </div>
      </div>
    `;
  } catch (e) {
    container.innerHTML = `
      <div class="container py-5 text-center">
        <h1 class="mb-3">Project not found</h1>
        <a href="/projects.html" class="btn-brand">← Back to projects</a>
      </div>`;
  }
})();
</script>
</body>
</html>
