<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/error-log.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0b0c0e">
<link rel="icon" type="image/png" href="/icons/icon-32.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<script>(function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<title>Project Proposal - Prince Caleb</title>
<meta name="description" content="Review and accept your project proposal.">
<meta name="robots" content="noindex, nofollow">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<style>
  .status-pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    line-height: 1;
    padding: 0.35rem 0.65rem;
    text-transform: capitalize;
  }
  .status-pill.unread,
  .status-pill.pending { background: #fef3c7; color: #92400e; }
  .status-pill.published { background: #dcfce7; color: #166534; }
  /* Clients print/PDF proposals before signing off — strip the site chrome
     and interactive controls, force a light document look (same approach
     as invoice.html). Status pills keep their tint so paid/pending still
     reads at a glance. */
  @media print {
    body { background: #fff !important; color: #000 !important; }
    .site-nav, .skip-link, #accept-proposal-form, #proposal-msg,
    .btn-brand, .btn-brand-outline { display: none !important; }
    .section { padding: 0 !important; }
    .contact-card { border: none; padding: 0 0 1.5rem; box-shadow: none !important; background: #fff !important; }
    .contact-card, .contact-card *:not(.status-pill) { color: #000 !important; }
    .contact-card [style*="background"] { background: #fff !important; border: 1px solid #ddd; }
    a { text-decoration: none !important; }
  }
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="/" class="brand-logo text-decoration-none"><span class="brand-mark" aria-hidden="true">P</span><span class="brand-text">Prince Caleb<span class="dot">.</span></span></a>
    <div class="utility-dock">
      <button type="button" class="utility-tab" aria-expanded="false" aria-controls="utility-tray" aria-label="Quick actions"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><polyline points="6 9 12 15 18 9"/></svg></button>
      <div class="utility-tray" id="utility-tray">
        <button type="button" class="theme-toggle" aria-label="Toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      </div>
    </div>
  </div>
</nav>

<main class="section" id="main-content">
  <div class="container" style="max-width: 920px;">
    <div id="proposal-content">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/utility-dock.js"></script>
<script>
(async function () {
  const token = new URLSearchParams(window.location.search).get('token');
  const wrap = document.getElementById('proposal-content');

  function escapeHtml(value) {
    return String(value || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function formatAmount(subunits, currency) {
    return `${currency} ${(Number(subunits || 0) / 100).toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
  }

  function paragraphHtml(value) {
    return escapeHtml(value).split(/\n\s*\n/).map(p => `<p class="text-muted-custom">${p.replace(/\n/g, '<br>')}</p>`).join('');
  }

  function renderError(title, text) {
    wrap.innerHTML = `
      <div class="contact-card text-center">
        <h1 class="h3 mb-2">${escapeHtml(title)}</h1>
        <p class="text-muted-custom mb-0">${escapeHtml(text)}</p>
      </div>
    `;
  }

  if (!token) {
    renderError('Missing proposal link', 'This proposal URL is incomplete.');
    return;
  }

  let proposal;
  try {
    proposal = await api.get(`/api/v1/proposals/${encodeURIComponent(token)}`);
  } catch (err) {
    renderError('Proposal not found', err.message || 'This proposal link may be invalid.');
    return;
  }

  const accepted = proposal.status === 'accepted';
  const milestones = proposal.milestones || [];
  wrap.innerHTML = `
    <div class="contact-card mb-4">
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">
        <div>
          <p class="eyebrow mb-2">Project proposal</p>
          <h1 class="display-1 mb-2">${escapeHtml(proposal.title)}</h1>
          <p class="text-muted-custom mb-0">Prepared for ${escapeHtml(proposal.client_name)}</p>
        </div>
        <div class="text-md-end">
          <span class="status-pill ${accepted ? 'published' : 'unread'}">${escapeHtml(proposal.status)}</span>
          <div class="pricing-price mt-2">${formatAmount(proposal.total_amount, proposal.currency)}</div>
        </div>
      </div>
      <h2 class="h5 mb-2">Scope</h2>
      ${paragraphHtml(proposal.scope)}
      ${proposal.timeline ? `<h2 class="h5 mt-4 mb-2">Timeline</h2><p class="text-muted-custom">${escapeHtml(proposal.timeline)}</p>` : ''}
      ${proposal.terms ? `<h2 class="h5 mt-4 mb-2">Terms</h2>${paragraphHtml(proposal.terms)}` : ''}
    </div>

    <div class="contact-card mb-4">
      <h2 class="h5 mb-3">Payment milestones</h2>
      <div class="d-flex flex-column gap-3">
        ${milestones.map(m => `
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 p-3 rounded" style="background: var(--bg-soft);">
            <div>
              <div class="fw-semibold">${escapeHtml(m.title)}</div>
              ${m.due_note ? `<div class="small text-muted-custom">${escapeHtml(m.due_note)}</div>` : ''}
              <div class="small text-muted-custom">${formatAmount(m.amount, m.currency)}</div>
            </div>
            <div class="d-flex align-items-center gap-2">
              <span class="status-pill ${m.payment_status === 'paid' ? 'published' : 'unread'}">${escapeHtml(m.payment_status || 'pending')}</span>
              ${accepted && m.payment_status !== 'paid' && m.payment_url ? `<a href="${escapeHtml(m.payment_url)}" class="btn-brand btn-sm">Pay now</a>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="contact-card text-center">
      <h2 class="h5 mb-2">${accepted ? 'Proposal accepted' : 'Ready to move forward?'}</h2>
      <p class="text-muted-custom mb-3">
        ${accepted
          ? `Accepted by ${escapeHtml(proposal.accepted_by_name || proposal.client_name)} on ${escapeHtml(new Date(proposal.accepted_at).toLocaleString())}. You can pay any pending milestone above.`
          : 'Review the scope, timeline, and terms above, then confirm below. The payment buttons will unlock once accepted.'}
      </p>
      <div id="proposal-msg" class="alert py-2 small d-none"></div>
      ${accepted ? '<a href="/contact.html" class="btn-brand-outline">Contact me</a>' : `
        <form id="accept-proposal-form" class="mx-auto text-start" style="max-width: 420px;">
          <div class="mb-3">
            <label class="form-label" for="accept-name">Type your full name to confirm</label>
            <input type="text" class="form-control" id="accept-name" required value="${escapeHtml(proposal.client_name)}">
          </div>
          <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="accept-terms-check" required>
            <label class="form-check-label" for="accept-terms-check">I have reviewed and agree to the scope, timeline, and terms above.</label>
          </div>
          <button type="submit" class="btn-brand w-100" id="accept-proposal-btn" disabled>Accept proposal</button>
        </form>
      `}
    </div>
  `;

  const acceptForm = document.getElementById('accept-proposal-form');
  if (acceptForm) {
    const acceptBtn = document.getElementById('accept-proposal-btn');
    const checkbox = document.getElementById('accept-terms-check');
    checkbox.addEventListener('change', () => {
      acceptBtn.disabled = !checkbox.checked;
    });

    acceptForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('proposal-msg');
      const name = document.getElementById('accept-name').value.trim();
      acceptBtn.disabled = true;
      acceptBtn.textContent = 'Accepting...';
      try {
        await api.post(`/api/v1/proposals/${encodeURIComponent(token)}/accept`, { accepted_by_name: name });
        window.location.reload();
      } catch (err) {
        msg.className = 'alert alert-danger py-2 small';
        msg.textContent = err.message || 'Could not accept proposal.';
        msg.classList.remove('d-none');
        acceptBtn.disabled = false;
        acceptBtn.textContent = 'Accept proposal';
      }
    });
  }
})();
</script>
<script src="/js/analytics.js"></script>
<script src="/js/pwa-register.js"></script>
</body>
</html>
