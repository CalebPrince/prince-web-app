<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<title>Reset Password - Prince Caleb</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="/" class="brand-logo text-decoration-none">Prince Caleb<span class="dot">.</span></a>
    <button type="button" class="theme-toggle" aria-label="Toggle dark mode">&#127769;</button>
  </div>
</nav>

<main class="section">
  <div class="container" style="max-width: 460px;">
    <div class="contact-card" id="form-view">
      <p class="eyebrow mb-2">Client portal</p>
      <h1 class="h3 mb-1">Choose a new password</h1>
      <p class="text-muted-custom mb-4 small">Must be at least 10 characters.</p>
      <form id="reset-form">
        <div class="mb-3">
          <label class="form-label fw-semibold" for="password">New password</label>
          <input type="password" class="form-control" id="password" required minlength="10" placeholder="At least 10 characters">
        </div>
        <div id="error" class="alert alert-danger py-2 small d-none"></div>
        <button type="submit" class="btn-brand w-100">Reset password</button>
      </form>
    </div>
    <div class="contact-card text-center d-none" id="invalid-view">
      <h1 class="h3 mb-2">This link is invalid</h1>
      <p class="text-muted-custom mb-0">Reset links expire after an hour. Request a new one below.</p>
      <a href="/client/forgot-password.html" class="btn-brand-outline mt-3">Request a new link</a>
    </div>
  </div>
</main>

<script src="/js/client-api.js"></script>
<script src="/js/theme.js"></script>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('form-view').classList.add('d-none');
  document.getElementById('invalid-view').classList.remove('d-none');
}

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('error');
  errorBox.classList.add('d-none');
  try {
    await clientApi.post('/api/v1/client/auth/reset-password', {
      token,
      password: document.getElementById('password').value,
    });
    window.location.href = '/client/dashboard.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.remove('d-none');
  }
});
</script>
</body>
</html>
