<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<title>Client Login - Prince Caleb</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="/" class="brand-logo text-decoration-none">Prince Caleb<span class="dot">.</span></a>
    <button type="button" class="theme-toggle" aria-label="Toggle dark mode">&#127769;</button>
  </div>
</nav>

<main class="section">
  <div class="container" style="max-width: 460px;">
    <div class="contact-card">
      <p class="eyebrow mb-2">Client portal</p>
      <h1 class="h3 mb-1">Log in</h1>
      <p class="text-muted-custom mb-4 small">See your project status, milestones, files, and messages.</p>
      <form id="login-form">
        <div class="mb-3">
          <label class="form-label fw-semibold" for="email">Email</label>
          <input type="email" class="form-control" id="email" required placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="password">Password</label>
          <input type="password" class="form-control" id="password" required placeholder="Your password">
        </div>
        <div id="error" class="alert alert-danger py-2 small d-none"></div>
        <button type="submit" class="btn-brand w-100">Log in</button>
      </form>
      <div class="text-center mt-3">
        <a href="/client/forgot-password.html" class="small text-decoration-none">Forgot your password?</a>
      </div>
    </div>
  </div>
</main>

<script src="/js/client-api.js"></script>
<script src="/js/theme.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('error');
  errorBox.classList.add('d-none');
  try {
    await clientApi.post('/api/v1/client/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });
    window.location.href = '/client/dashboard.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.remove('d-none');
  }
});
</script>
</body>
</html>
