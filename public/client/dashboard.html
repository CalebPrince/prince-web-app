<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<title>Client Portal - Prince Caleb</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<style>
  .status-pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    line-height: 1;
    padding: 0.35rem 0.65rem;
    text-transform: capitalize;
  }
  .status-pill.unread,
  .status-pill.pending { background: #fef3c7; color: #92400e; }
  .status-pill.published { background: #dcfce7; color: #166534; }
  .status-pill.down { background: #fee2e2; color: #991b1b; }
  .message-bubble { max-width: 80%; padding: 0.6rem 0.9rem; border-radius: 0.75rem; }
  .message-bubble.from-client { background: var(--heading-color); color: var(--bg); align-self: flex-end; }
  .message-bubble.from-admin { background: var(--bg-soft); align-self: flex-start; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="/" class="brand-logo text-decoration-none">Prince Caleb<span class="dot">.</span></a>
    <div class="d-flex align-items-center gap-3">
      <span class="small text-muted-custom" id="client-name"></span>
      <a href="#" id="client-logout-link" class="small text-decoration-none">Log out</a>
      <button type="button" class="theme-toggle" aria-label="Toggle dark mode">&#127769;</button>
    </div>
  </div>
</nav>

<main class="section">
  <div class="container" style="max-width: 920px;">
    <p class="eyebrow mb-2">Client portal</p>
    <h1 class="display-6 mb-4">Your projects</h1>

    <div id="uptime-wrap"></div>

    <div id="proposals-wrap"></div>

    <div class="contact-card mb-4">
      <h2 class="h5 mb-3">Files</h2>
      <div id="files-msg" class="alert py-2 small d-none"></div>
      <div id="files-list" class="d-flex flex-column gap-2 mb-3"></div>
      <form id="file-form" class="d-flex gap-2 align-items-end flex-wrap">
        <div class="flex-grow-1">
          <label class="form-label small mb-1" for="file-input">Upload a file</label>
          <input type="file" class="form-control" id="file-input" required>
        </div>
        <button type="submit" class="btn-brand">Upload</button>
      </form>
    </div>

    <div class="contact-card">
      <h2 class="h5 mb-3">Messages</h2>
      <div id="messages-thread" class="d-flex flex-column gap-2 mb-3" style="max-height: 360px; overflow-y: auto;"></div>
      <form id="message-form" class="d-flex gap-2">
        <input type="text" class="form-control" id="message-input" placeholder="Type a message..." required>
        <button type="submit" class="btn-brand">Send</button>
      </form>
    </div>
  </div>
</main>

<script src="/js/client-api.js"></script>
<script src="/js/client-auth.js"></script>
<script src="/js/theme.js"></script>
<script>
(async function () {
  const client = await requireClientAuth();
  if (!client) return;
  wireClientLogout();
  document.getElementById('client-name').textContent = client.name;

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function formatAmount(subunits, currency) {
    return `${currency} ${(Number(subunits || 0) / 100).toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
  }

  async function loadDashboard() {
    const wrap = document.getElementById('proposals-wrap');
    let data;
    try {
      data = await clientApi.get('/api/v1/client/dashboard');
    } catch (err) {
      wrap.innerHTML = `<div class="alert alert-danger py-2 small">${escapeHtml(err.message)}</div>`;
      return;
    }
    renderMonitors(data.monitors || []);

    const proposals = data.proposals || [];
    if (!proposals.length) {
      wrap.innerHTML = '<div class="contact-card text-center text-muted-custom py-4">No projects yet.</div>';
      return;
    }

    wrap.innerHTML = proposals.map(p => {
      const accepted = p.status === 'accepted';
      const milestones = p.milestones || [];
      return `
        <div class="contact-card mb-4">
          <div class="d-flex flex-column flex-md-row justify-content-between gap-2 mb-3">
            <div>
              <h2 class="h5 mb-1">${escapeHtml(p.title)}</h2>
              ${p.timeline ? `<div class="small text-muted-custom">Timeline: ${escapeHtml(p.timeline)}</div>` : ''}
            </div>
            <div class="text-md-end">
              <span class="status-pill ${accepted ? 'published' : 'unread'}">${escapeHtml(p.status)}</span>
              <div class="pricing-price mt-1">${formatAmount(p.total_amount, p.currency)}</div>
            </div>
          </div>
          <div class="d-flex flex-column gap-2">
            ${milestones.map(m => `
              <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 p-3 rounded" style="background: var(--bg-soft);">
                <div>
                  <div class="fw-semibold">${escapeHtml(m.title)}</div>
                  ${m.due_note ? `<div class="small text-muted-custom">${escapeHtml(m.due_note)}</div>` : ''}
                  <div class="small text-muted-custom">${formatAmount(m.amount, m.currency)}</div>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <span class="status-pill ${m.payment_status === 'paid' ? 'published' : 'unread'}">${escapeHtml(m.payment_status || 'pending')}</span>
                  ${accepted && m.payment_status !== 'paid' && m.payment_url ? `<a href="${escapeHtml(m.payment_url)}" class="btn-brand btn-sm">Pay now</a>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderMonitors(monitors) {
    const wrap = document.getElementById('uptime-wrap');
    if (!monitors.length) {
      wrap.innerHTML = '';
      return;
    }
    wrap.innerHTML = `
      <div class="contact-card mb-4">
        <h2 class="h5 mb-3">Your site status</h2>
        <div class="d-flex flex-column gap-2">
          ${monitors.map(m => {
            const up = m.last_status === 'up';
            const unknown = !m.last_status;
            return `
              <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 p-3 rounded" style="background: var(--bg-soft);">
                <div>
                  <div class="fw-semibold">${escapeHtml(m.name)}</div>
                  <a href="${escapeHtml(m.url)}" target="_blank" rel="noopener" class="small text-muted-custom">${escapeHtml(m.url)}</a>
                </div>
                <div class="text-md-end">
                  <span class="status-pill ${unknown ? 'pending' : (up ? 'published' : 'down')}">${unknown ? 'checking…' : (up ? '● Online' : '● Down')}</span>
                  ${m.uptime_30d != null ? `<div class="small text-muted-custom mt-1">${m.uptime_30d}% uptime (30 days)${m.avg_response_ms != null ? ` · ${m.avg_response_ms}ms avg` : ''}</div>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  async function loadFiles() {
    const list = document.getElementById('files-list');
    let files;
    try {
      files = await clientApi.get('/api/v1/client/files');
    } catch (err) {
      list.innerHTML = `<div class="alert alert-danger py-2 small">${escapeHtml(err.message)}</div>`;
      return;
    }
    if (!files.length) {
      list.innerHTML = '<div class="small text-muted-custom">No files yet.</div>';
      return;
    }
    list.innerHTML = files.map(f => `
      <div class="d-flex justify-content-between align-items-center p-2 rounded" style="background: var(--bg-soft);">
        <a href="${escapeHtml(f.file_path)}" target="_blank" rel="noopener">${escapeHtml(f.original_name)}</a>
        <span class="small text-muted-custom">${f.uploaded_by === 'admin' ? 'From Prince' : 'You'} · ${new Date(f.created_at).toLocaleDateString()}</span>
      </div>
    `).join('');
  }

  async function loadMessages() {
    const thread = document.getElementById('messages-thread');
    let messages;
    try {
      messages = await clientApi.get('/api/v1/client/messages');
    } catch (err) {
      thread.innerHTML = `<div class="alert alert-danger py-2 small">${escapeHtml(err.message)}</div>`;
      return;
    }
    if (!messages.length) {
      thread.innerHTML = '<div class="small text-muted-custom">No messages yet — say hello!</div>';
      return;
    }
    thread.innerHTML = messages.map(m => `
      <div class="d-flex ${m.sender_type === 'client' ? 'justify-content-end' : 'justify-content-start'}">
        <div class="message-bubble from-${m.sender_type}">
          <div>${escapeHtml(m.body)}</div>
          <div class="small" style="opacity: 0.7;">${new Date(m.created_at).toLocaleString()}</div>
        </div>
      </div>
    `).join('');
    thread.scrollTop = thread.scrollHeight;
  }

  document.getElementById('file-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('files-msg');
    msg.classList.add('d-none');
    const input = document.getElementById('file-input');
    if (!input.files.length) return;

    const formData = new FormData();
    formData.append('file', input.files[0]);
    try {
      await fetch('/api/v1/client/files', { method: 'POST', credentials: 'same-origin', body: formData })
        .then(async res => {
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || 'Upload failed.');
          }
        });
      document.getElementById('file-form').reset();
      await loadFiles();
    } catch (err) {
      msg.className = 'alert alert-danger py-2 small';
      msg.textContent = err.message;
      msg.classList.remove('d-none');
    }
  });

  document.getElementById('message-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('message-input');
    const body = input.value.trim();
    if (!body) return;
    try {
      await clientApi.post('/api/v1/client/messages', { body });
      input.value = '';
      await loadMessages();
    } catch (err) {
      alert(err.message);
    }
  });

  await Promise.all([loadDashboard(), loadFiles(), loadMessages()]);
})();
</script>
</body>
</html>
