<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4f46e5">
<link rel="icon" type="image/png" href="/icons/icon-32.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script>(function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<title>Complete Payment — Prince Caleb</title>
<meta name="description" content="Complete your payment.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="/" class="brand-logo text-decoration-none">Prince Caleb<span class="dot">.</span></a>
    <button type="button" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </div>
</nav>

<section class="section" id="main-content">
  <div class="container" style="max-width: 480px;">
    <div id="pay-content">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
<script>
(async function () {
  console.log('Pay page script initialized');
  const container = document.getElementById('pay-content');
  const token = new URLSearchParams(window.location.search).get('token');
  console.log('Token from URL:', token);

  function escapeHtml(value) {
    return String(value || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function renderState(title, description) {
    console.log('Render state:', title, description);
    container.innerHTML = `
      <div class="contact-card text-center">
        <h4 class="mb-2">${escapeHtml(title)}</h4>
        <p class="text-muted-custom mb-0">${escapeHtml(description)}</p>
      </div>
    `;
  }

  function currencyDisplay(code) {
    const normalized = String(code || '').toUpperCase();
    return normalized === 'USD' ? '$' : normalized;
  }

  async function verifyWithRetry(reference) {
    let lastError;
    for (let attempt = 1; attempt <= 2; attempt += 1) {
      try {
        return await api.post('/api/v1/payments/verify', { reference }, { timeoutMs: 15000 });
      } catch (err) {
        console.error('Verification attempt', attempt, 'failed:', err);
        lastError = err;
      }
    }
    throw lastError;
  }

  window.addEventListener('error', (e) => {
    console.error('Global error caught:', e.error);
  });

  if (!token) {
    renderState('Missing payment link', 'This payment URL is incomplete.');
    return;
  }

  let link, config;
  try {
    [link, config] = await Promise.all([
      api.get(`/api/v1/payments/link/${encodeURIComponent(token)}`),
      api.get('/api/v1/payments/config'),
    ]);
    console.log('Fetched link and config', link, config);
  } catch (e) {
    console.error('Error fetching payment data', e);
    renderState('Payment link not found', 'This link may have expired or the token is incorrect.');
    return;
  }

  if (link.status === 'paid') {
    renderState('Already paid', 'This invoice has already been settled. Thank you.');
    return;
  }

  if (!config.public_key) {
    renderState('Payments are temporarily unavailable', 'Please try again later or contact me directly.');
    return;
  }

  const safeDescription = escapeHtml(link.description || 'Payment');
  const safeClientName = escapeHtml(link.client_name || 'Client');
  const amountValue = (link.amount / 100).toLocaleString(undefined, { minimumFractionDigits: 2 });
  const currencyLabel = currencyDisplay(link.currency);
  const formattedAmount = currencyLabel === '$'
    ? `${currencyLabel}${amountValue}`
    : `${escapeHtml(currencyLabel)} ${amountValue}`;

  container.innerHTML = `
    <div class="contact-card">
      <h4 class="mb-1">${safeDescription}</h4>
      <p class="text-muted-custom mb-2">For ${safeClientName}</p>
      <div class="pricing-price mb-3">${formattedAmount}</div>
      <p class="small text-muted-custom mb-3">You will be redirected to Paystack's secure checkout.</p>
      <button type="button" class="btn-brand w-100" id="pay-now-btn">Pay Now</button>
      <div id="pay-msg" class="alert py-2 small d-none mt-3"></div>
    </div>
  `;

  const btn = document.getElementById('pay-now-btn');
  const msg = document.getElementById('pay-msg');

  function showMessage(type, text) {
    const classMap = {
      info: 'alert alert-info py-2 small mt-3',
      success: 'alert alert-success py-2 small mt-3',
      warning: 'alert alert-warning py-2 small mt-3',
      danger: 'alert alert-danger py-2 small mt-3',
    };
    msg.className = classMap[type] || classMap.info;
    msg.textContent = text;
    msg.classList.remove('d-none');
  }

  let inFlight = false;
  btn.addEventListener('click', async () => {
    if (inFlight) return;
    inFlight = true;
    msg.classList.add('d-none');
    btn.disabled = true;
    btn.textContent = 'Preparing secure checkout...';

    try {
      console.log('Pay button clicked, token:', token);
      const prep = await api.post('/api/v1/payments/prepare', { link_token: token }, { timeoutMs: 15000 });
      console.log('Prepare response:', prep);
      showMessage('info', 'Secure checkout opened. Complete payment to continue.');

      

      const handler = PaystackPop.setup({
        key: config.public_key,
        email: prep.email,
        amount: prep.amount,
        currency: prep.currency,
        ref: prep.reference,
        callback: function (response) {
          btn.disabled = true;
          btn.textContent = 'Verifying payment...';
          (async () => {
            try {
              const result = await verifyWithRetry(response.reference);
              if (result.status === 'success') {
                container.innerHTML = '<div class="contact-card text-center"><h4 class="mb-2">Payment received</h4><p class="text-muted-custom mb-3">Thank you. I will be in touch shortly.</p><a href="/" class="btn-brand">Back to home</a></div>';
              } else {
                showMessage('warning', 'Payment completed but confirmation is still pending. If you were charged, I will reconcile it shortly.');
                btn.disabled = false;
                btn.textContent = 'Try Again';
                inFlight = false;
              }
            } catch (_) {
              showMessage('warning', 'Verification is delayed. If you were charged, I will reconcile it shortly.');
              btn.disabled = false;
              btn.textContent = 'Try Again';
              inFlight = false;
            }
          })();
        },
        onClose: function () {
          showMessage('info', 'Checkout closed before completion. You can try again anytime.');
          btn.disabled = false;
          btn.textContent = 'Pay Now';
          inFlight = false;
        },
      });
      handler.openIframe();
    } catch (err) {
      showMessage('danger', err.message || 'Something went wrong while preparing checkout.');
      btn.disabled = false;
      btn.textContent = 'Pay Now';
      inFlight = false;
    }
  });
})();
</script>
<script src="/js/analytics.js"></script>
<script src="/js/pwa-register.js"></script>
</body>
</html>
