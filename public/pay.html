<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4f46e5">
<link rel="icon" type="image/png" href="/icons/icon-32.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script>(function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<title>Complete Payment — Prince Caleb</title>
<meta name="description" content="Complete your payment.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>

<nav class="site-nav">
  <div class="container d-flex align-items-center justify-content-between py-3">
    <a href="/" class="brand-logo text-decoration-none">Prince Caleb<span class="dot">.</span></a>
    <button type="button" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </div>
</nav>

<section class="section" id="main-content">
  <div class="container" style="max-width: 480px;">
    <div id="pay-content">
      <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
<script>
(async function () {
  const container = document.getElementById('pay-content');
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    container.innerHTML = '<div class="text-center py-5"><h4>Missing payment link</h4></div>';
    return;
  }

  let link, config;
  try {
    [link, config] = await Promise.all([
      api.get(`/api/v1/payments/link/${encodeURIComponent(token)}`),
      api.get('/api/v1/payments/config'),
    ]);
  } catch (e) {
    container.innerHTML = '<div class="text-center py-5"><h4>Payment link not found</h4><p class="text-muted-custom">This link may have expired or the token is incorrect.</p></div>';
    return;
  }

  if (link.status === 'paid') {
    container.innerHTML = `
      <div class="text-center py-5">
        <h4>✓ Already paid</h4>
        <p class="text-muted-custom">This invoice has already been settled. Thank you!</p>
      </div>`;
    return;
  }

  if (!config.public_key) {
    container.innerHTML = '<div class="text-center py-5"><h4>Payments are temporarily unavailable</h4></div>';
    return;
  }

  container.innerHTML = `
    <div class="contact-card">
      <h4 class="mb-1">${link.description}</h4>
      <p class="text-muted-custom mb-3">For ${link.client_name}</p>
      <div class="pricing-price mb-4">${link.currency} ${(link.amount / 100).toLocaleString(undefined, { minimumFractionDigits: 2 })}</div>
      <button type="button" class="btn-brand w-100" id="pay-now-btn">Pay Now</button>
      <div id="pay-msg" class="alert py-2 small d-none mt-3"></div>
    </div>
  `;

  document.getElementById('pay-now-btn').addEventListener('click', async () => {
    const btn = document.getElementById('pay-now-btn');
    const msg = document.getElementById('pay-msg');
    btn.disabled = true;
    btn.textContent = 'Preparing…';

    try {
      const prep = await api.post('/api/v1/payments/prepare', { link_token: token });
      btn.textContent = 'Pay Now';
      btn.disabled = false;

      const handler = PaystackPop.setup({
        key: config.public_key,
        email: prep.email,
        amount: prep.amount,
        currency: prep.currency,
        ref: prep.reference,
        callback: function (response) {
          api.post('/api/v1/payments/verify', { reference: response.reference }).then((result) => {
            if (result.status === 'success') {
              container.innerHTML = '<div class="text-center py-5"><h4>✓ Payment received</h4><p class="text-muted-custom">Thank you — I\'ll be in touch shortly.</p></div>';
            } else {
              msg.className = 'alert alert-danger py-2 small mt-3';
              msg.textContent = 'Payment could not be confirmed. If you were charged, please contact me directly.';
              msg.classList.remove('d-none');
            }
          });
        },
        onClose: function () {},
      });
      handler.openIframe();
    } catch (err) {
      msg.className = 'alert alert-danger py-2 small mt-3';
      msg.textContent = err.message || 'Something went wrong.';
      msg.classList.remove('d-none');
      btn.disabled = false;
      btn.textContent = 'Pay Now';
    }
  });
})();
</script>
<script src="/js/analytics.js"></script>
<script src="/js/pwa-register.js"></script>
</body>
</html>
