<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<link href="/css/admin.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">
  <div class="admin-sidebar p-3">
    <div class="brand mb-4 fs-5">Prince Caleb<span class="dot">.</span></div>
    <nav class="d-flex flex-column gap-1">
      <a href="/admin/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/admin/analytics.html" class="nav-link">Analytics</a>
      <a href="/admin/projects.html" class="nav-link">Projects</a>
      <a href="/admin/blog.html" class="nav-link">Blog</a>
      <a href="/admin/newsletter.html" class="nav-link active">Newsletter</a>
      <a href="/admin/inquiries.html" class="nav-link"><span>Inquiries</span><span id="nav-badge-inquiries" class="notif-badge d-none"></span></a>
      <a href="/admin/quote-requests.html" class="nav-link">Quote Requests</a>
      <a href="/admin/payments.html" class="nav-link">Payments</a>
      <a href="/admin/chats.html" class="nav-link"><span>Chat Leads</span><span id="nav-badge-chats" class="notif-badge d-none"></span></a>
      <a href="/admin/tags.html" class="nav-link">Tags</a>
      <a href="/admin/content.html" class="nav-link">Site Content</a>
      <a href="/admin/settings.html" class="nav-link">Settings</a>
      <hr class="sidebar-divider">
      <a href="/" class="nav-link">&larr; View site</a>
      <a href="#" class="nav-link" id="logout-link">Log out</a>
    </nav>
  </div>

  <div class="flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="mb-0">Newsletter</h3>
        <p class="text-muted-custom mb-0 small">Subscribers from the blog signup form.</p>
      </div>
      <a href="/api/v1/admin/newsletter/export" class="btn btn-sm btn-outline-secondary">Export CSV</a>
    </div>

    <div class="admin-card p-0">
      <table class="table mb-0 align-middle">
        <thead>
          <tr>
            <th class="ps-3">Email</th>
            <th>Status</th>
            <th>Subscribed</th>
            <th class="text-end pe-3">Actions</th>
          </tr>
        </thead>
        <tbody id="subscribers-tbody"></tbody>
      </table>
    </div>
    <div id="empty-state" class="text-center text-muted-custom py-5 d-none">No subscribers yet.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin-auth.js"></script>
<script src="/js/admin-nav-badges.js"></script>
<script src="/js/admin-newsletter.js"></script>
</body>
</html>
