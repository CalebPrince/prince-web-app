<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/error-log.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>(function(){var t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
<title>Admin Login — Prince Caleb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<link href="/css/admin.css" rel="stylesheet">
</head>
<body>

<button type="button" class="theme-toggle page-theme-toggle" aria-label="Toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>

<div class="auth-shell is-split">
  <div class="auth-split">
    <div class="auth-brand-panel">
      <span class="brand-mark" aria-hidden="true">P</span>
      <span class="auth-split-title">Prince Caleb<span class="dot">.</span></span>
      <p class="auth-split-tagline">// Portfolio Admin — manage projects, proposals, payments, and content from one place.</p>
    </div>
    <div class="auth-form-panel">
      <div class="auth-box">
        <p class="auth-eyebrow">// Admin access</p>
        <h1 class="h3 mb-1">Log in</h1>
        <p class="auth-subtitle">Prince Caleb — Portfolio Admin</p>
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label fw-semibold" for="email">Email</label>
            <input type="email" class="form-control" id="email" required placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="password">Password</label>
            <div class="password-field">
              <input type="password" class="form-control" id="password" required placeholder="Your password">
              <button type="button" class="password-toggle" data-target="password" aria-label="Show password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
          </div>
          <div id="error" class="alert alert-danger d-none"></div>
          <button type="submit" class="btn-brand w-100">Log in</button>
        </form>

        <!-- Only rendered when a Google OAuth client id is configured in
             Admin → Settings; hidden again while the 2FA step is showing. -->
        <div id="google-signin-wrap" class="d-none">
          <div class="d-flex align-items-center gap-2 my-3" aria-hidden="true">
            <hr class="flex-grow-1 my-0">
            <span class="text-muted-custom small">or</span>
            <hr class="flex-grow-1 my-0">
          </div>
          <div id="google-signin-btn" class="d-flex justify-content-center"></div>
          <div id="google-error" class="alert alert-danger d-none mt-3"></div>
        </div>

        <form id="twofa-form" class="d-none">
          <p class="text-muted-custom small mb-3">Enter the 6-digit code from your authenticator app.</p>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="twofa-code">Code</label>
            <input type="text" class="form-control" id="twofa-code" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="123456" autofocus>
          </div>
          <div id="twofa-error" class="alert alert-danger d-none"></div>
          <button type="submit" class="btn-brand w-100">Verify</button>
          <button type="button" class="btn btn-link btn-sm w-100 mt-1" id="use-backup-link">Use a backup code instead</button>
        </form>

        <div class="text-center mt-3">
          <a href="/" class="small text-decoration-none">&larr; Return to website</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/auth-ui.js"></script>
<script>
let usingBackupCode = false;

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('error');
  errorBox.classList.add('d-none');
  try {
    const res = await api.post('/api/v1/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });
    if (res.requires_2fa) {
      document.getElementById('login-form').classList.add('d-none');
      document.getElementById('google-signin-wrap').classList.add('d-none');
      document.getElementById('twofa-form').classList.remove('d-none');
      return;
    }
    window.location.href = '/admin/dashboard.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.remove('d-none');
  }
});

document.getElementById('use-backup-link').addEventListener('click', () => {
  usingBackupCode = !usingBackupCode;
  const input = document.getElementById('twofa-code');
  const link = document.getElementById('use-backup-link');
  if (usingBackupCode) {
    input.placeholder = 'A1B2C3D4';
    input.maxLength = 8;
    link.textContent = 'Use an authenticator code instead';
  } else {
    input.placeholder = '123456';
    input.maxLength = 6;
    link.textContent = 'Use a backup code instead';
  }
  input.value = '';
  input.focus();
});

document.getElementById('twofa-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('twofa-error');
  errorBox.classList.add('d-none');
  const value = document.getElementById('twofa-code').value.trim();
  try {
    await api.post('/api/v1/auth/verify-2fa', usingBackupCode ? { backup_code: value } : { code: value });
    window.location.href = '/admin/dashboard.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.remove('d-none');
  }
});

// Google sign-in — the button only appears when a client id is configured,
// so the page works unchanged (password only) until then. The GIS script is
// loaded lazily to keep the login page dependency-free otherwise.
(async function () {
  try {
    const { client_id } = await api.get('/api/v1/auth/google/client-id');
    if (!client_id) return;

    const gsi = document.createElement('script');
    gsi.src = 'https://accounts.google.com/gsi/client';
    gsi.async = true;
    gsi.onload = () => {
      google.accounts.id.initialize({
        client_id,
        callback: async (response) => {
          const errorBox = document.getElementById('google-error');
          errorBox.classList.add('d-none');
          try {
            await api.post('/api/v1/auth/google', { credential: response.credential });
            window.location.href = '/admin/dashboard.html';
          } catch (err) {
            errorBox.textContent = err.message;
            errorBox.classList.remove('d-none');
          }
        },
      });
      google.accounts.id.renderButton(document.getElementById('google-signin-btn'), {
        theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'filled_black' : 'outline',
        size: 'large',
        text: 'signin_with',
        width: 320,
      });
      document.getElementById('google-signin-wrap').classList.remove('d-none');
    };
    document.head.appendChild(gsi);
  } catch (_) {
    // Endpoint unavailable — password login still works.
  }
})();
</script>
</body>
</html>
