<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Prince Caleb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<link href="/css/admin.css" rel="stylesheet">
</head>
<body>

<div class="auth-shell">
  <div class="auth-box">
    <h3 class="mb-1">Admin Login</h3>
    <p class="text-muted-custom mb-4 small">Prince Caleb — Portfolio Admin</p>
    <form id="login-form">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="email">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="password">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <div id="error" class="alert alert-danger d-none"></div>
      <button type="submit" class="btn-brand w-100">Log in</button>
    </form>
    <div class="text-center mt-3">
      <a href="/" class="small text-decoration-none">&larr; Return to website</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('error');
  errorBox.classList.add('d-none');
  try {
    await api.post('/api/v1/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });
    window.location.href = '/admin/dashboard.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.remove('d-none');
  }
});
</script>
</body>
</html>
