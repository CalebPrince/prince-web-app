<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inquiries — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/app.css" rel="stylesheet">
<link href="/css/admin.css" rel="stylesheet">
</head>
<body>

<div class="d-flex">
  <div class="admin-sidebar p-3">
    <div class="brand mb-4 fs-5">Prince Caleb<span class="dot">.</span></div>
    <nav class="d-flex flex-column gap-1">
      <a href="/admin/dashboard.html" class="nav-link">Dashboard</a>
      <a href="/admin/projects.html" class="nav-link">Projects</a>
      <a href="/admin/inquiries.html" class="nav-link active">Inquiries</a>
      <a href="/admin/chats.html" class="nav-link">Chat Leads</a>
      <a href="/admin/tags.html" class="nav-link">Tags</a>
      <a href="/admin/content.html" class="nav-link">Site Content</a>
      <a href="/admin/settings.html" class="nav-link">Settings</a>
      <hr class="sidebar-divider">
      <a href="/" class="nav-link">&larr; View site</a>
      <a href="#" class="nav-link" id="logout-link">Log out</a>
    </nav>
  </div>

  <div class="flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h3 class="mb-0">Inquiries</h3>
        <p class="text-muted-custom mb-0 small">Client contact form submissions.</p>
      </div>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="status-filter" style="width:auto;">
          <option value="">All</option>
          <option value="unread">Unread</option>
          <option value="read">Read</option>
          <option value="flagged">Flagged</option>
          <option value="archived">Archived</option>
        </select>
      </div>
    </div>

    <div id="inquiries-list"></div>
    <div id="empty-state" class="text-center text-muted-custom py-5 d-none">No inquiries yet.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin-auth.js"></script>
<script src="/js/admin-inquiries.js"></script>
</body>
</html>
