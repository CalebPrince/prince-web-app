<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8fafc"/>
  <!-- browser chrome -->
  <rect x="0" y="0" width="800" height="36" fill="#ffffff"/>
  <rect x="0" y="35" width="800" height="1" fill="#e2e8f0"/>
  <circle cx="20" cy="18" r="5" fill="#ef4444"/>
  <circle cx="38" cy="18" r="5" fill="#f59e0b"/>
  <circle cx="56" cy="18" r="5" fill="#22c55e"/>
  <rect x="90" y="9" width="260" height="18" rx="9" fill="#f1f5f9"/>
  <text x="100" y="22" font-family="Arial" font-size="11" fill="#64748b">shop.example.com</text>

  <!-- storefront nav -->
  <rect x="0" y="36" width="800" height="60" fill="#ffffff"/>
  <text x="40" y="72" font-family="Arial" font-size="18" fill="#0f172a" font-weight="bold">AURA</text>
  <rect x="500" y="58" width="60" height="10" rx="3" fill="#cbd5e1"/>
  <rect x="580" y="58" width="60" height="10" rx="3" fill="#cbd5e1"/>
  <rect x="660" y="58" width="60" height="10" rx="3" fill="#cbd5e1"/>
  <circle cx="755" cy="63" r="12" fill="#0d9488"/>

  <!-- hero band -->
  <rect x="0" y="96" width="800" height="160" fill="#0d9488"/>
  <text x="40" y="160" font-family="Arial" font-size="26" fill="#ffffff" font-weight="bold">New Season Collection</text>
  <text x="40" y="188" font-family="Arial" font-size="13" fill="#ccfbf1">Headless storefront, statically rendered from WordPress</text>
  <rect x="40" y="205" width="120" height="30" rx="6" fill="#ffffff"/>
  <text x="60" y="225" font-family="Arial" font-size="12" fill="#0d9488" font-weight="bold">SHOP NOW</text>

  <!-- product grid -->
  <g>
    <rect x="40" y="280" width="160" height="130" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="52" y="292" width="136" height="80" rx="6" fill="#e2e8f0"/>
    <rect x="52" y="382" width="90" height="8" rx="3" fill="#94a3b8"/>
    <rect x="52" y="396" width="50" height="8" rx="3" fill="#0d9488"/>
  </g>
  <g>
    <rect x="220" y="280" width="160" height="130" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="232" y="292" width="136" height="80" rx="6" fill="#e2e8f0"/>
    <rect x="232" y="382" width="90" height="8" rx="3" fill="#94a3b8"/>
    <rect x="232" y="396" width="50" height="8" rx="3" fill="#0d9488"/>
  </g>
  <g>
    <rect x="400" y="280" width="160" height="130" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="412" y="292" width="136" height="80" rx="6" fill="#e2e8f0"/>
    <rect x="412" y="382" width="90" height="8" rx="3" fill="#94a3b8"/>
    <rect x="412" y="396" width="50" height="8" rx="3" fill="#0d9488"/>
  </g>
  <g>
    <rect x="580" y="280" width="180" height="130" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="592" y="292" width="156" height="80" rx="6" fill="#e2e8f0"/>
    <rect x="592" y="382" width="90" height="8" rx="3" fill="#94a3b8"/>
    <rect x="592" y="396" width="50" height="8" rx="3" fill="#0d9488"/>
  </g>

  <rect x="0" y="440" width="800" height="60" fill="#0f172a"/>
  <text x="40" y="475" font-family="Arial" font-size="11" fill="#94a3b8">Powered by a headless WordPress content layer</text>
</svg>
