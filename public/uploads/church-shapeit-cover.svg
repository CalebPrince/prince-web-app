<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0b1220"/>
  <!-- browser chrome -->
  <rect x="0" y="0" width="800" height="36" fill="#151f30"/>
  <circle cx="20" cy="18" r="5" fill="#ef4444"/>
  <circle cx="38" cy="18" r="5" fill="#f59e0b"/>
  <circle cx="56" cy="18" r="5" fill="#22c55e"/>
  <rect x="90" y="9" width="320" height="18" rx="9" fill="#0b1220"/>
  <text x="100" y="22" font-family="Arial" font-size="11" fill="#64748b">lcamedia.duckdns.org/church-shapeit/</text>

  <!-- header -->
  <text x="40" y="70" font-family="Arial" font-size="18" fill="#e7ecf3" font-weight="bold">Church Shape It — 10-Band EQ</text>

  <!-- presets -->
  <g>
    <rect x="40" y="90" width="110" height="30" rx="15" fill="#4f46e5"/>
    <text x="58" y="110" font-family="Arial" font-size="11" fill="#ffffff" font-weight="bold">Pastor Mic</text>
    <rect x="160" y="90" width="90" height="30" rx="15" fill="#151f30" stroke="#334155"/>
    <text x="180" y="110" font-family="Arial" font-size="11" fill="#cbd5e1">Choir</text>
    <rect x="260" y="90" width="110" height="30" rx="15" fill="#151f30" stroke="#334155"/>
    <text x="278" y="110" font-family="Arial" font-size="11" fill="#cbd5e1">Band Mix</text>
    <rect x="380" y="90" width="140" height="30" rx="15" fill="#151f30" stroke="#334155"/>
    <text x="398" y="110" font-family="Arial" font-size="11" fill="#cbd5e1">Stream Optimized</text>
  </g>

  <!-- EQ band strips -->
  <rect x="40" y="140" width="720" height="320" rx="10" fill="#151f30" stroke="#24354d"/>
  <g font-family="Arial" font-size="9" fill="#8ca0b3" text-anchor="middle">
    <text x="90" y="450">31Hz</text>
    <text x="155" y="450">62Hz</text>
    <text x="220" y="450">125Hz</text>
    <text x="285" y="450">250Hz</text>
    <text x="350" y="450">500Hz</text>
    <text x="415" y="450">1kHz</text>
    <text x="480" y="450">2kHz</text>
    <text x="545" y="450">4kHz</text>
    <text x="610" y="450">8kHz</text>
    <text x="675" y="450">16kHz</text>
  </g>
  <!-- vertical fader tracks -->
  <g stroke="#334155" stroke-width="3">
    <line x1="90" y1="170" x2="90" y2="430"/>
    <line x1="155" y1="170" x2="155" y2="430"/>
    <line x1="220" y1="170" x2="220" y2="430"/>
    <line x1="285" y1="170" x2="285" y2="430"/>
    <line x1="350" y1="170" x2="350" y2="430"/>
    <line x1="415" y1="170" x2="415" y2="430"/>
    <line x1="480" y1="170" x2="480" y2="430"/>
    <line x1="545" y1="170" x2="545" y2="430"/>
    <line x1="610" y1="170" x2="610" y2="430"/>
    <line x1="675" y1="170" x2="675" y2="430"/>
  </g>
  <!-- fader handles at varying gain positions -->
  <g fill="#4f46e5">
    <circle cx="90" cy="330" r="9"/>
    <circle cx="155" cy="300" r="9"/>
    <circle cx="220" cy="260" r="9"/>
    <circle cx="285" cy="220" r="9"/>
    <circle cx="350" cy="300" r="9"/>
    <circle cx="415" cy="280" r="9"/>
    <circle cx="480" cy="240" r="9"/>
    <circle cx="545" cy="270" r="9"/>
    <circle cx="610" cy="310" r="9"/>
    <circle cx="675" cy="340" r="9"/>
  </g>
  <line x1="60" y1="300" x2="705" y2="300" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="705" y="296" font-family="Arial" font-size="9" fill="#64748b" text-anchor="end">0 dB</text>
</svg>
