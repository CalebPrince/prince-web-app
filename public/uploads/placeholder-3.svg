<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f1f5f9"/>
  <!-- ambient backdrop -->
  <rect width="800" height="500" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- phone frame -->
  <rect x="300" y="40" width="200" height="420" rx="28" fill="#0f172a"/>
  <rect x="310" y="60" width="180" height="380" rx="16" fill="#ffffff"/>
  <rect x="360" y="52" width="80" height="14" rx="7" fill="#0f172a"/>

  <!-- status bar -->
  <text x="325" y="80" font-family="Arial" font-size="9" fill="#0f172a">9:41</text>

  <!-- app header -->
  <text x="325" y="110" font-family="Arial" font-size="14" fill="#0f172a" font-weight="bold">Book a session</text>
  <text x="325" y="128" font-family="Arial" font-size="9" fill="#64748b">Choose a time that works for you</text>

  <!-- calendar strip -->
  <g>
    <rect x="325" y="145" width="34" height="46" rx="8" fill="#7c3aed"/>
    <text x="333" y="163" font-family="Arial" font-size="8" fill="#e9d5ff">MON</text>
    <text x="336" y="180" font-family="Arial" font-size="12" fill="#ffffff" font-weight="bold">12</text>

    <rect x="366" y="145" width="34" height="46" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="374" y="163" font-family="Arial" font-size="8" fill="#94a3b8">TUE</text>
    <text x="377" y="180" font-family="Arial" font-size="12" fill="#0f172a" font-weight="bold">13</text>

    <rect x="407" y="145" width="34" height="46" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="415" y="163" font-family="Arial" font-size="8" fill="#94a3b8">WED</text>
    <text x="418" y="180" font-family="Arial" font-size="12" fill="#0f172a" font-weight="bold">14</text>

    <rect x="448" y="145" width="34" height="46" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="456" y="163" font-family="Arial" font-size="8" fill="#94a3b8">THU</text>
    <text x="459" y="180" font-family="Arial" font-size="12" fill="#0f172a" font-weight="bold">15</text>
  </g>

  <!-- time slots -->
  <rect x="325" y="205" width="165" height="34" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="340" y="226" font-family="Arial" font-size="11" fill="#6d28d9" font-weight="bold">9:00 AM — Available</text>

  <rect x="325" y="248" width="165" height="34" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="340" y="269" font-family="Arial" font-size="11" fill="#64748b">11:30 AM — Available</text>

  <rect x="325" y="291" width="165" height="34" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="340" y="312" font-family="Arial" font-size="11" fill="#cbd5e1">2:00 PM — Booked</text>

  <!-- CTA -->
  <rect x="325" y="400" width="165" height="36" rx="18" fill="#7c3aed"/>
  <text x="375" y="423" font-family="Arial" font-size="12" fill="#ffffff" font-weight="bold">Confirm</text>

  <!-- bottom nav -->
  <rect x="310" y="410" width="0" height="0"/>
  <circle cx="345" cy="450" r="4" fill="#7c3aed"/>
  <circle cx="400" cy="450" r="4" fill="#cbd5e1"/>
  <circle cx="455" cy="450" r="4" fill="#cbd5e1"/>

  <text x="60" y="450" font-family="Arial" font-size="13" fill="#64748b">One React Native codebase —</text>
  <text x="60" y="470" font-family="Arial" font-size="13" fill="#64748b">iOS &amp; Android, native feel</text>
</svg>
